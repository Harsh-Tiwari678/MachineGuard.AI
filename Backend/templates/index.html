<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MachineGuard AI Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container">
        <h1>MachineGuard AI - Prediction Dashboard</h1>

        <div class="machine-card">
            <h2 id="machineName">{{ machine.name if machine else "Machine 1" }}</h2>
            <p>Status: <span id="status">{{ machine.status if machine else "-" }}</span></p>
            <p>Prediction: <span id="prediction">{{ machine.prediction if machine else "-" }}</span></p>
        </div>

        <button id="simulateBtn">Simulate New Data</button>

        <!-- History Table -->
        <h2>Last 20 Predictions</h2>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Status</th>
                    <th>Prediction</th>
                </tr>
            </thead>
            <tbody>
              
            </tbody>
        </table>

        <h2>Failure Trend (Last 10 Records)</h2>
        <canvas id="trendChart"></canvas>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
